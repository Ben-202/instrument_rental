/name: Lint Python Code

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint main app files
      run: |
        # Check app.py for critical errors (this will fail if errors found)
        flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
        
        # Check models.py if it exists (warnings only, won't fail)
        if [ -f models.py ]; then
          flake8 models.py --count --select=E9,F63,F7,F82 --show-source --statistics || true
        fi
      continue-on-error: false
    
    - name: Lint all files for warnings (optional)
      run: |
        # Check all Python files for warnings but don't fail the build
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
